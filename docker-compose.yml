services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Templates — mount from host so you can edit without rebuild
      - ./storage/templates:/app/storage/templates:ro
      # Contracts + DB + logs — persist on host
      - ./storage/contracts:/app/storage/contracts
      - ./storage/logs:/app/storage/logs
      - bot-data:/app/storage
    environment:
      - STORAGE_DIR=/app/storage

volumes:
  bot-data:
